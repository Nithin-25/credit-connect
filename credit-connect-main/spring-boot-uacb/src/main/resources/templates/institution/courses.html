<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}">
    <title>Manage Courses - UACB</title>
</head>
<body>
    <div class="tricolor-bar"></div>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <aside th:replace="~{fragments/header :: sidebar-institution}"></aside>
            </div>
            
            <div class="col-md-10 main-content p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="mb-0"><i class="bi bi-book me-2"></i>Manage Courses</h4>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addCourseModal">
                        <i class="bi bi-plus-circle me-2"></i>Add Course
                    </button>
                </div>
                
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle me-2"></i><span th:text="${success}">Success</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <!-- Courses Table -->
                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Course Code</th>
                                        <th>Course Name</th>
                                        <th>Type</th>
                                        <th>Credits</th>
                                        <th>Semester</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="course : ${courses}">
                                        <td><code th:text="${course.courseCode}">CS101</code></td>
                                        <td th:text="${course.courseName}">Data Structures</td>
                                        <td><span class="badge bg-secondary" th:text="${course.courseType}">CORE</span></td>
                                        <td><span class="badge bg-primary" th:text="${course.creditValue}">4</span></td>
                                        <td th:text="${course.semester ?: '-'}">1</td>
                                        <td>
                                            <span class="badge" th:classappend="${course.isActive} ? 'bg-success' : 'bg-secondary'"
                                                  th:text="${course.isActive} ? 'Active' : 'Inactive'">Active</span>
                                        </td>
                                    </tr>
                                    <tr th:if="${courses.size() == 0}">
                                        <td colspan="6" class="text-center py-4 text-muted">
                                            <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                            No courses added yet. Click "Add Course" to create one.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Add Course Modal -->
    <div class="modal fade" id="addCourseModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>Add New Course</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/institution/courses/add}" method="post" th:object="${courseDto}">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Course Code</label>
                            <input type="text" class="form-control" th:field="*{courseCode}" placeholder="e.g., CS101" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Course Name</label>
                            <input type="text" class="form-control" th:field="*{courseName}" placeholder="e.g., Data Structures" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="2"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Credit Value</label>
                                <input type="number" class="form-control" th:field="*{creditValue}" min="1" max="10" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Semester</label>
                                <input type="number" class="form-control" th:field="*{semester}" min="1" max="8">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Course Type</label>
                            <select class="form-select" th:field="*{courseType}" required>
                                <option value="CORE">Core</option>
                                <option value="ELECTIVE">Elective</option>
                                <option value="OPEN_ELECTIVE">Open Elective</option>
                                <option value="LAB">Lab</option>
                                <option value="PROJECT">Project</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Add Course</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
