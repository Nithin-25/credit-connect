<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}">
    <title>Issued Credits - UACB</title>
</head>
<body>
    <div class="tricolor-bar"></div>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <aside th:replace="~{fragments/header :: sidebar-institution}"></aside>
            </div>
            
            <div class="col-md-10 main-content p-4">
                <h4 class="mb-4"><i class="bi bi-list-check me-2"></i>Issued Credits</h4>
                
                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Certificate #</th>
                                        <th>Student</th>
                                        <th>Course</th>
                                        <th>Credits</th>
                                        <th>Grade</th>
                                        <th>Date Issued</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="credit : ${credits}">
                                        <td><code class="small" th:text="${credit.certificateNumber}">UACB-xxx</code></td>
                                        <td>
                                            <div th:text="${credit.student.user.name}">Name</div>
                                            <small class="text-muted" th:text="${credit.student.enrollmentNumber}">ID</small>
                                        </td>
                                        <td>
                                            <div th:text="${credit.course.courseName}">Course</div>
                                            <small class="text-muted" th:text="${credit.course.courseCode}">Code</small>
                                        </td>
                                        <td><span class="badge bg-primary" th:text="${credit.course.creditValue}">4</span></td>
                                        <td><span class="badge bg-success" th:text="${credit.grade}">A</span></td>
                                        <td th:text="${#temporals.format(credit.createdAt, 'dd MMM yyyy')}">Date</td>
                                        <td>
                                            <span class="badge" 
                                                  th:classappend="${credit.status.name() == 'VERIFIED'} ? 'bg-success' : (${credit.status.name() == 'PENDING'} ? 'bg-warning text-dark' : 'bg-danger')"
                                                  th:text="${credit.status}">Status</span>
                                        </td>
                                    </tr>
                                    <tr th:if="${credits.size() == 0}">
                                        <td colspan="7" class="text-center py-4 text-muted">
                                            <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                            No credits issued yet
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
