<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}">
    <title>Profile - UACB</title>
</head>
<body>
    <div class="tricolor-bar"></div>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <aside th:replace="~{fragments/header :: sidebar-student}"></aside>
            </div>
            
            <div class="col-md-10 main-content p-4">
                <h4 class="mb-4"><i class="bi bi-person me-2"></i>My Profile</h4>
                
                <div class="row">
                    <div class="col-md-4">
                        <div class="card shadow-sm text-center">
                            <div class="card-body p-4">
                                <div class="rounded-circle bg-primary bg-opacity-10 p-4 d-inline-block mb-3">
                                    <i class="bi bi-person-circle fs-1 text-primary"></i>
                                </div>
                                <h5 th:text="${user.name}">Student Name</h5>
                                <p class="text-muted mb-1" th:text="${user.email}">email@example.com</p>
                                <span class="badge bg-primary" th:text="${profile.enrollmentNumber}">2021CS001</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="card shadow-sm">
                            <div class="card-header bg-white">
                                <h5 class="mb-0">Profile Information</h5>
                            </div>
                            <div class="card-body">
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="text-muted small">Full Name</label>
                                        <p class="mb-0 fw-bold" th:text="${user.name}">Name</p>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="text-muted small">Email</label>
                                        <p class="mb-0 fw-bold" th:text="${user.email}">email@example.com</p>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="text-muted small">Enrollment Number</label>
                                        <p class="mb-0 fw-bold" th:text="${profile.enrollmentNumber ?: 'Not set'}">2021CS001</p>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="text-muted small">Date of Birth</label>
                                        <p class="mb-0 fw-bold" th:text="${profile.dateOfBirth != null} ? ${#temporals.format(profile.dateOfBirth, 'dd MMM yyyy')} : 'Not set'">01 Jan 2000</p>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="text-muted small">Phone Number</label>
                                        <p class="mb-0 fw-bold" th:text="${profile.phoneNumber ?: 'Not set'}">9876543210</p>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="text-muted small">Current Institution</label>
                                        <p class="mb-0 fw-bold" th:text="${profile.currentInstitution != null} ? ${profile.currentInstitution.institutionName} : 'Not set'">IIT Delhi</p>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-12">
                                        <label class="text-muted small">Degree Program</label>
                                        <p class="mb-0 fw-bold" th:text="${profile.degreeProgram != null} ? ${profile.degreeProgram.programName} : 'Not enrolled'">B.Tech CS</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
