<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UACB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --govt-blue: #003366;
            --govt-orange: #FF9933;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        
        .login-header {
            background: linear-gradient(135deg, var(--govt-blue) 0%, #004080 100%);
            color: white;
            border-radius: 16px 16px 0 0;
            padding: 2rem;
        }
        
        .btn-login {
            background: linear-gradient(135deg, var(--govt-blue) 0%, #004080 100%);
            border: none;
            padding: 12px;
        }
        
        .btn-login:hover {
            background: linear-gradient(135deg, #004080 0%, #005599 100%);
        }
        
        .form-control:focus {
            border-color: var(--govt-blue);
            box-shadow: 0 0 0 0.2rem rgba(0,51,102,0.25);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card login-card">
                    <div class="login-header text-center">
                        <i class="bi bi-bank2 fs-1 mb-2 d-block"></i>
                        <h4 class="mb-0">UACB Login</h4>
                        <small>Unified Academic Credit Bank</small>
                    </div>
                    <div class="card-body p-4">
                        <div th:if="${error}" class="alert alert-danger" role="alert">
                            <i class="bi bi-exclamation-circle me-2"></i>
                            <span th:text="${error}">Invalid credentials</span>
                        </div>
                        <div th:if="${message}" class="alert alert-success" role="alert">
                            <i class="bi bi-check-circle me-2"></i>
                            <span th:text="${message}">Success</span>
                        </div>
                        <div th:if="${param.logout}" class="alert alert-info" role="alert">
                            <i class="bi bi-box-arrow-right me-2"></i>
                            You have been logged out successfully.
                        </div>
                        
                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control" id="username" name="username" 
                                           placeholder="Enter your email" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control" id="password" name="password" 
                                           placeholder="Enter your password" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary btn-login w-100 mb-3">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                            </button>
                        </form>
                        
                        <div class="text-center">
                            <p class="mb-0">
                                Don't have an account? 
                                <a th:href="@{/register}" class="text-decoration-none" style="color: var(--govt-blue);">Register here</a>
                            </p>
                        </div>
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <a th:href="@{/}" class="text-muted text-decoration-none">
                        <i class="bi bi-arrow-left me-1"></i>Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
