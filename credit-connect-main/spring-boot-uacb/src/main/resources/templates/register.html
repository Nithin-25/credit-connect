<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - UACB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --govt-blue: #003366;
            --govt-orange: #FF9933;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 40px 0;
        }
        
        .register-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        
        .register-header {
            background: linear-gradient(135deg, var(--govt-blue) 0%, #004080 100%);
            color: white;
            border-radius: 16px 16px 0 0;
            padding: 1.5rem;
        }
        
        .btn-register {
            background: linear-gradient(135deg, var(--govt-blue) 0%, #004080 100%);
            border: none;
            padding: 12px;
        }
        
        .btn-register:hover {
            background: linear-gradient(135deg, #004080 0%, #005599 100%);
        }
        
        .form-control:focus, .form-select:focus {
            border-color: var(--govt-blue);
            box-shadow: 0 0 0 0.2rem rgba(0,51,102,0.25);
        }
        
        .role-card {
            cursor: pointer;
            border: 2px solid #dee2e6;
            transition: all 0.3s;
        }
        
        .role-card:hover {
            border-color: var(--govt-blue);
        }
        
        .role-card.selected {
            border-color: var(--govt-blue);
            background-color: rgba(0,51,102,0.05);
        }
        
        .hidden-fields {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card register-card">
                    <div class="register-header text-center">
                        <i class="bi bi-person-plus fs-2 mb-2 d-block"></i>
                        <h4 class="mb-0">Create Account</h4>
                        <small>Join the Unified Academic Credit Bank</small>
                    </div>
                    <div class="card-body p-4">
                        <div th:if="${error}" class="alert alert-danger" role="alert">
                            <i class="bi bi-exclamation-circle me-2"></i>
                            <span th:text="${error}">Error</span>
                        </div>
                        
                        <form th:action="@{/register}" method="post" th:object="${registration}">
                            <!-- Role Selection -->
                            <div class="mb-4">
                                <label class="form-label fw-bold">I am a:</label>
                                <div class="row g-3">
                                    <div class="col-6">
                                        <div class="role-card card p-3 text-center" onclick="selectRole('STUDENT')">
                                            <i class="bi bi-mortarboard fs-2 text-primary"></i>
                                            <div class="mt-2">Student</div>
                                        </div>
                                    </div>
                                    <div class="col-6">
                                        <div class="role-card card p-3 text-center" onclick="selectRole('INSTITUTION')">
                                            <i class="bi bi-building fs-2 text-success"></i>
                                            <div class="mt-2">Institution</div>
                                        </div>
                                    </div>
                                </div>
                                <input type="hidden" th:field="*{role}" id="roleInput">
                            </div>
                            
                            <!-- Common Fields -->
                            <div class="mb-3">
                                <label for="name" class="form-label">Full Name</label>
                                <input type="text" class="form-control" th:field="*{name}" placeholder="Enter your full name" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" th:field="*{email}" placeholder="Enter your email" required>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" class="form-control" th:field="*{password}" placeholder="Min 6 characters" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                                    <input type="password" class="form-control" th:field="*{confirmPassword}" placeholder="Repeat password" required>
                                </div>
                            </div>
                            
                            <!-- Student-specific Fields -->
                            <div id="studentFields" class="hidden-fields">
                                <hr>
                                <h6 class="mb-3"><i class="bi bi-mortarboard me-2"></i>Student Details</h6>
                                <div class="mb-3">
                                    <label for="enrollmentNumber" class="form-label">Enrollment Number</label>
                                    <input type="text" class="form-control" th:field="*{enrollmentNumber}" placeholder="e.g., 2021CS001">
                                </div>
                            </div>
                            
                            <!-- Institution-specific Fields -->
                            <div id="institutionFields" class="hidden-fields">
                                <hr>
                                <h6 class="mb-3"><i class="bi bi-building me-2"></i>Institution Details</h6>
                                <div class="mb-3">
                                    <label for="institutionName" class="form-label">Institution Name</label>
                                    <input type="text" class="form-control" th:field="*{institutionName}" placeholder="e.g., IIT Delhi">
                                </div>
                                <div class="mb-3">
                                    <label for="institutionCode" class="form-label">Institution Code</label>
                                    <input type="text" class="form-control" th:field="*{institutionCode}" placeholder="e.g., IITD">
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary btn-register w-100 mt-3 mb-3">
                                <i class="bi bi-person-check me-2"></i>Create Account
                            </button>
                        </form>
                        
                        <div class="text-center">
                            <p class="mb-0">
                                Already have an account? 
                                <a th:href="@{/login}" class="text-decoration-none" style="color: var(--govt-blue);">Sign in here</a>
                            </p>
                        </div>
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <a th:href="@{/}" class="text-muted text-decoration-none">
                        <i class="bi bi-arrow-left me-1"></i>Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function selectRole(role) {
            document.getElementById('roleInput').value = role;
            
            // Update card styling
            document.querySelectorAll('.role-card').forEach(card => card.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            
            // Show/hide role-specific fields
            document.getElementById('studentFields').style.display = role === 'STUDENT' ? 'block' : 'none';
            document.getElementById('institutionFields').style.display = role === 'INSTITUTION' ? 'block' : 'none';
        }
    </script>
</body>
</html>
