<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}">
    <title>Admin Dashboard - UACB</title>
</head>
<body>
    <div class="tricolor-bar"></div>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <aside th:replace="~{fragments/header :: sidebar-admin}"></aside>
            </div>
            
            <div class="col-md-10 main-content p-4">
                <h4 class="mb-4"><i class="bi bi-speedometer2 me-2"></i>Admin Dashboard</h4>
                
                <!-- Stats Cards -->
                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="card stat-card shadow-sm h-100 bg-primary text-white">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h3 class="mb-0" th:text="${totalStudents}">0</h3>
                                        <div>Total Students</div>
                                    </div>
                                    <i class="bi bi-people fs-1 opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card shadow-sm h-100 bg-success text-white">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h3 class="mb-0" th:text="${totalInstitutions}">0</h3>
                                        <div>Institutions</div>
                                    </div>
                                    <i class="bi bi-building fs-1 opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card shadow-sm h-100 bg-info text-white">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h3 class="mb-0" th:text="${totalCreditsIssued}">0</h3>
                                        <div>Credits Issued</div>
                                    </div>
                                    <i class="bi bi-mortarboard fs-1 opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card shadow-sm h-100 bg-warning text-dark">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h3 class="mb-0" th:text="${pendingVerifications}">0</h3>
                                        <div>Pending Verifications</div>
                                    </div>
                                    <i class="bi bi-clock-history fs-1 opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="row g-4">
                    <!-- Pending Verifications -->
                    <div class="col-md-6">
                        <div class="card shadow-sm h-100">
                            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                                <h5 class="mb-0"><i class="bi bi-clock me-2 text-warning"></i>Pending Verifications</h5>
                                <a th:href="@{/admin/verifications}" class="btn btn-outline-primary btn-sm">View All</a>
                            </div>
                            <div class="card-body p-0">
                                <div class="list-group list-group-flush">
                                    <div th:each="credit : ${pendingCredits}" class="list-group-item">
                                        <div class="d-flex justify-content-between align-items-center">
                                            <div>
                                                <div class="fw-bold" th:text="${credit.student.user.name}">Student</div>
                                                <small class="text-muted" th:text="${credit.course.courseName}">Course</small>
                                            </div>
                                            <span class="badge bg-warning text-dark">Pending</span>
                                        </div>
                                    </div>
                                    <div th:if="${pendingCredits.size() == 0}" class="list-group-item text-center text-muted py-4">
                                        No pending verifications
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Recent Activity -->
                    <div class="col-md-6">
                        <div class="card shadow-sm h-100">
                            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                                <h5 class="mb-0"><i class="bi bi-activity me-2 text-primary"></i>Recent Activity</h5>
                                <a th:href="@{/admin/audit-logs}" class="btn btn-outline-primary btn-sm">View All</a>
                            </div>
                            <div class="card-body p-0">
                                <div class="list-group list-group-flush">
                                    <div th:each="log : ${recentLogs}" class="list-group-item">
                                        <div class="d-flex justify-content-between">
                                            <div>
                                                <small class="text-muted" th:text="${log.action}">ACTION</small>
                                                <div th:text="${log.description}">Description</div>
                                            </div>
                                            <small class="text-muted" th:text="${#temporals.format(log.createdAt, 'HH:mm')}">Time</small>
                                        </div>
                                    </div>
                                    <div th:if="${recentLogs.size() == 0}" class="list-group-item text-center text-muted py-4">
                                        No recent activity
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
