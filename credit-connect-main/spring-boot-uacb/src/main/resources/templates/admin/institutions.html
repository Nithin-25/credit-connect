<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}">
    <title>Institutions - UACB</title>
</head>
<body>
    <div class="tricolor-bar"></div>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <aside th:replace="~{fragments/header :: sidebar-admin}"></aside>
            </div>
            
            <div class="col-md-10 main-content p-4">
                <h4 class="mb-4"><i class="bi bi-building me-2"></i>All Institutions</h4>
                
                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Code</th>
                                        <th>Institution Name</th>
                                        <th>Type</th>
                                        <th>City</th>
                                        <th>Contact</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="inst : ${institutions}">
                                        <td><code th:text="${inst.institutionCode}">Code</code></td>
                                        <td>
                                            <div th:text="${inst.institutionName}">Name</div>
                                            <small class="text-muted" th:text="${inst.user.email}">Email</small>
                                        </td>
                                        <td><span class="badge bg-secondary" th:text="${inst.institutionType}">Type</span></td>
                                        <td th:text="${inst.city ?: '-'}">City</td>
                                        <td th:text="${inst.contactNumber ?: '-'}">Contact</td>
                                        <td>
                                            <span class="badge" th:classappend="${inst.isVerified} ? 'bg-success' : 'bg-warning text-dark'"
                                                  th:text="${inst.isVerified} ? 'Verified' : 'Pending'">Status</span>
                                        </td>
                                    </tr>
                                    <tr th:if="${institutions.size() == 0}">
                                        <td colspan="6" class="text-center py-4 text-muted">No institutions registered</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
