<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}">
    <title>Students - UACB</title>
</head>
<body>
    <div class="tricolor-bar"></div>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <aside th:replace="~{fragments/header :: sidebar-admin}"></aside>
            </div>
            
            <div class="col-md-10 main-content p-4">
                <h4 class="mb-4"><i class="bi bi-people me-2"></i>All Students</h4>
                
                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Enrollment #</th>
                                        <th>Name</th>
                                        <th>Email</th>
                                        <th>Institution</th>
                                        <th>Degree Program</th>
                                        <th>Total Credits</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="student : ${students}">
                                        <td><code th:text="${student.enrollmentNumber}">ID</code></td>
                                        <td th:text="${student.user.name}">Name</td>
                                        <td th:text="${student.user.email}">Email</td>
                                        <td th:text="${student.currentInstitution != null} ? ${student.currentInstitution.institutionName} : '-'">Institution</td>
                                        <td th:text="${student.degreeProgram != null} ? ${student.degreeProgram.programName} : '-'">Program</td>
                                        <td><span class="badge bg-primary" th:text="${student.totalCredits}">0</span></td>
                                    </tr>
                                    <tr th:if="${students.size() == 0}">
                                        <td colspan="6" class="text-center py-4 text-muted">No students registered</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
