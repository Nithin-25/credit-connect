<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}">
    <title>Pending Verifications - UACB</title>
</head>
<body>
    <div class="tricolor-bar"></div>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <aside th:replace="~{fragments/header :: sidebar-admin}"></aside>
            </div>
            
            <div class="col-md-10 main-content p-4">
                <h4 class="mb-4"><i class="bi bi-check-circle me-2"></i>Pending Credit Verifications</h4>
                
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle me-2"></i><span th:text="${success}">Success</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}">Error</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Student</th>
                                        <th>Course</th>
                                        <th>Institution</th>
                                        <th>Credits</th>
                                        <th>Grade</th>
                                        <th>Submitted</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="credit : ${pendingCredits}">
                                        <td>
                                            <div class="fw-bold" th:text="${credit.student.user.name}">Student Name</div>
                                            <small class="text-muted" th:text="${credit.student.enrollmentNumber}">ID</small>
                                        </td>
                                        <td>
                                            <div th:text="${credit.course.courseName}">Course Name</div>
                                            <small class="text-muted" th:text="${credit.course.courseCode}">Code</small>
                                        </td>
                                        <td th:text="${credit.issuingInstitution.institutionName}">Institution</td>
                                        <td><span class="badge bg-primary" th:text="${credit.course.creditValue}">4</span></td>
                                        <td><span class="badge bg-info" th:text="${credit.grade}">A</span></td>
                                        <td th:text="${#temporals.format(credit.createdAt, 'dd MMM yyyy')}">Date</td>
                                        <td>
                                            <div class="btn-group btn-group-sm">
                                                <form th:action="@{/admin/verify/{id}(id=${credit.id})}" method="post" class="d-inline">
                                                    <input type="hidden" name="action" value="approve">
                                                    <input type="hidden" name="remarks" value="Verified by admin">
                                                    <button type="submit" class="btn btn-success btn-sm">
                                                        <i class="bi bi-check"></i> Approve
                                                    </button>
                                                </form>
                                                <button type="button" class="btn btn-danger btn-sm" 
                                                        data-bs-toggle="modal" 
                                                        th:data-bs-target="'#rejectModal' + ${credit.id}">
                                                    <i class="bi bi-x"></i> Reject
                                                </button>
                                            </div>
                                            
                                            <!-- Reject Modal -->
                                            <div class="modal fade" th:id="'rejectModal' + ${credit.id}" tabindex="-1">
                                                <div class="modal-dialog">
                                                    <div class="modal-content">
                                                        <div class="modal-header">
                                                            <h5 class="modal-title">Reject Credit</h5>
                                                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                                        </div>
                                                        <form th:action="@{/admin/verify/{id}(id=${credit.id})}" method="post">
                                                            <div class="modal-body">
                                                                <input type="hidden" name="action" value="reject">
                                                                <div class="mb-3">
                                                                    <label class="form-label">Reason for rejection</label>
                                                                    <textarea name="remarks" class="form-control" rows="3" required 
                                                                              placeholder="Enter reason for rejection..."></textarea>
                                                                </div>
                                                            </div>
                                                            <div class="modal-footer">
                                                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                                                <button type="submit" class="btn btn-danger">Confirm Reject</button>
                                                            </div>
                                                        </form>
                                                    </div>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr th:if="${pendingCredits.size() == 0}">
                                        <td colspan="7" class="text-center py-5 text-muted">
                                            <i class="bi bi-check-circle fs-1 d-block mb-2 text-success"></i>
                                            All credits have been verified. No pending verifications.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
