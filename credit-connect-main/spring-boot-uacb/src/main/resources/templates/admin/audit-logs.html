<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}">
    <title>Audit Logs - UACB</title>
</head>
<body>
    <div class="tricolor-bar"></div>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <aside th:replace="~{fragments/header :: sidebar-admin}"></aside>
            </div>
            
            <div class="col-md-10 main-content p-4">
                <h4 class="mb-4"><i class="bi bi-journal-text me-2"></i>Audit Logs</h4>
                
                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover table-sm mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Timestamp</th>
                                        <th>User</th>
                                        <th>Action</th>
                                        <th>Entity</th>
                                        <th>Description</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="log : ${logs.content}">
                                        <td>
                                            <small th:text="${#temporals.format(log.createdAt, 'dd MMM yyyy HH:mm:ss')}">DateTime</small>
                                        </td>
                                        <td th:text="${log.user != null} ? ${log.user.email} : 'System'">User</td>
                                        <td>
                                            <span class="badge" 
                                                  th:classappend="${log.action.name().contains('VERIFIED')} ? 'bg-success' : 
                                                                  (${log.action.name().contains('REJECTED')} ? 'bg-danger' : 
                                                                  (${log.action.name().contains('CREATE') or log.action.name().contains('ISSUED')} ? 'bg-primary' : 'bg-secondary'))"
                                                  th:text="${log.action}">Action</span>
                                        </td>
                                        <td th:text="${log.entityType}">Entity</td>
                                        <td><small th:text="${log.description}">Description</small></td>
                                    </tr>
                                    <tr th:if="${logs.content.size() == 0}">
                                        <td colspan="5" class="text-center py-4 text-muted">No audit logs found</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer bg-white" th:if="${logs.totalPages > 1}">
                        <nav>
                            <ul class="pagination pagination-sm mb-0 justify-content-center">
                                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/audit-logs(page=${currentPage - 1})}">Previous</a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(0, logs.totalPages - 1)}" 
                                    th:classappend="${i == currentPage} ? 'active'">
                                    <a class="page-link" th:href="@{/admin/audit-logs(page=${i})}" th:text="${i + 1}">1</a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage == logs.totalPages - 1} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/audit-logs(page=${currentPage + 1})}">Next</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
